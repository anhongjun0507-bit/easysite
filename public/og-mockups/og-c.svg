<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- 시안 C: 그라데이션 + 사이트 미리보기 카드 -->
  <!-- 카피 매칭: "가격을 처음부터 공개하는 1인 프리랜서" — 정보 밀도 -->
  <defs>
    <style>
      .ko { font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif; }
    </style>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="55%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#c026d3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#1e1b4b" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- 배경 그라데이션 -->
  <rect width="1200" height="630" fill="url(#bg-grad)"/>

  <!-- 후광 블롭 -->
  <circle cx="100" cy="100" r="260" fill="#f0abfc" opacity="0.22"/>
  <circle cx="1100" cy="560" r="240" fill="#4338ca" opacity="0.35"/>

  <!-- 좌상단 로고 -->
  <g class="ko">
    <circle cx="84" cy="83" r="9" fill="#fff"/>
    <text x="108" y="92" fill="#ffffff" font-size="32" font-weight="700" letter-spacing="-0.5">EasySite</text>
  </g>

  <!-- 좌측 카피 영역 -->
  <g class="ko">
    <text x="84" y="290" fill="#fef3c7" font-size="22" font-weight="700" letter-spacing="4">PRICING TRANSPARENT</text>
    <text x="84" y="370" fill="#ffffff" font-size="58" font-weight="800" letter-spacing="-1">가격을 처음부터</text>
    <text x="84" y="438" fill="#ffffff" font-size="58" font-weight="800" letter-spacing="-1">공개하는</text>
    <text x="84" y="510" fill="#ffffff" font-size="58" font-weight="800" letter-spacing="-1">1인 프리랜서.</text>

    <text x="84" y="568" fill="#e0e7ff" font-size="22" font-weight="500">easysite.kr · 안홍준</text>
  </g>

  <!-- 우측 사이트 미리보기 카드 (목업) -->
  <g filter="url(#shadow)">
    <rect x="700" y="120" width="440" height="400" rx="20" fill="#ffffff"/>

    <!-- 브라우저 dots -->
    <circle cx="724" cy="148" r="6" fill="#fca5a5"/>
    <circle cx="744" cy="148" r="6" fill="#fde047"/>
    <circle cx="764" cy="148" r="6" fill="#86efac"/>
    <rect x="790" y="138" width="240" height="20" rx="10" fill="#f3f4f6"/>

    <!-- 내용 영역 -->
    <g class="ko">
      <!-- 카테고리 chip -->
      <rect x="730" y="190" width="120" height="32" rx="16" fill="#eef2ff"/>
      <text x="790" y="211" text-anchor="middle" fill="#4338ca" font-size="14" font-weight="700">PRICING</text>

      <!-- h2 -->
      <text x="730" y="266" fill="#111827" font-size="28" font-weight="800" letter-spacing="-0.5">사이트 유형별 시작가</text>

      <!-- 가격 행 -->
      <line x1="730" y1="296" x2="1110" y2="296" stroke="#e5e7eb" stroke-width="1.5"/>
      <g class="ko" font-size="18">
        <text x="730" y="328" fill="#4b5563" font-weight="500">회사·가게 소개</text>
        <text x="1110" y="328" text-anchor="end" fill="#4f46e5" font-weight="800">50만원~</text>
      </g>
      <line x1="730" y1="350" x2="1110" y2="350" stroke="#f3f4f6" stroke-width="1.5"/>
      <g class="ko" font-size="18">
        <text x="730" y="382" fill="#4b5563" font-weight="500">예약·신청 사이트</text>
        <text x="1110" y="382" text-anchor="end" fill="#4f46e5" font-weight="800">80만원~</text>
      </g>
      <line x1="730" y1="404" x2="1110" y2="404" stroke="#f3f4f6" stroke-width="1.5"/>
      <g class="ko" font-size="18">
        <text x="730" y="436" fill="#4b5563" font-weight="500">간단한 쇼핑몰</text>
        <text x="1110" y="436" text-anchor="end" fill="#4f46e5" font-weight="800">120만원~</text>
      </g>
      <line x1="730" y1="458" x2="1110" y2="458" stroke="#f3f4f6" stroke-width="1.5"/>

      <!-- CTA pill -->
      <rect x="730" y="478" width="180" height="32" rx="16" fill="#4f46e5"/>
      <text x="820" y="499" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">1분 만에 견적 →</text>
    </g>
  </g>
</svg>
