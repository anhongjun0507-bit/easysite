<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- 시안 A: 단색 indigo + 흰색 카피 + 작은 로고 -->
  <!-- 카피 매칭: "아이디어만 있으면 됩니다" — 브랜드 슬로건, 최대 임팩트 -->
  <defs>
    <style>
      .ko { font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif; }
    </style>
  </defs>

  <!-- 배경: indigo-600 솔리드 -->
  <rect width="1200" height="630" fill="#4f46e5"/>

  <!-- 미세 톤 변화: 좌상단 살짝 밝게, 우하단 살짝 어둡게 (블러 후광) -->
  <circle cx="180" cy="120" r="280" fill="#818cf8" opacity="0.18"/>
  <circle cx="1080" cy="540" r="240" fill="#312e81" opacity="0.25"/>

  <!-- 좌상단 로고 + 점 -->
  <g class="ko">
    <circle cx="84" cy="83" r="9" fill="#fff"/>
    <text x="108" y="92" fill="#ffffff" font-size="32" font-weight="700" letter-spacing="-0.5">EasySite</text>
  </g>

  <!-- 가운데 큰 카피 -->
  <g class="ko" text-anchor="middle">
    <text x="600" y="320" fill="#ffffff" font-size="104" font-weight="800" letter-spacing="-2">아이디어만 있으면</text>
    <text x="600" y="440" fill="#ffffff" font-size="104" font-weight="800" letter-spacing="-2">됩니다.</text>
  </g>

  <!-- 우하단 보조 라인 -->
  <g class="ko" text-anchor="end">
    <text x="1116" y="568" fill="#c7d2fe" font-size="24" font-weight="500">easysite.kr · 1인 프리랜서 안홍준</text>
  </g>
</svg>
