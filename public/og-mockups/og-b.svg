<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- 시안 B: 동심원 분광 SVG (about 페이지 톤) + 카피 -->
  <!-- 카피 매칭: "1분 만에 견적, AI가 만든 초안까지" — "하나가 여러 결과로 펼쳐지는" -->
  <defs>
    <style>
      .ko { font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif; }
    </style>
    <linearGradient id="prism-arc-og" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
    <radialGradient id="prism-dot-og" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </radialGradient>
  </defs>

  <!-- 배경: 화이트 -->
  <rect width="1200" height="630" fill="#ffffff"/>

  <!-- 좌측 분광 (about 페이지 SVG를 1200x630에 맞춰 좌측 정렬, 크게) -->
  <g transform="translate(120, 50)">
    <!-- 광원 점 (확대) -->
    <circle cx="50" cy="270" r="22" fill="url(#prism-dot-og)"/>

    <!-- 6개 동심원 우반 호 — 반지름 70 → 380 -->
    <g stroke="url(#prism-arc-og)" fill="none" stroke-linecap="round">
      <path d="M 50 200 A 70 70 0 0 1 50 340" stroke-width="6" opacity="0.95"/>
      <path d="M 50 140 A 130 130 0 0 1 50 400" stroke-width="5" opacity="0.78"/>
      <path d="M 50 80  A 190 190 0 0 1 50 460" stroke-width="4.5" opacity="0.58"/>
      <path d="M 50 20  A 250 250 0 0 1 50 520" stroke-width="4" opacity="0.42"/>
      <path d="M 50 -50 A 320 320 0 0 1 50 590" stroke-width="3.5" opacity="0.28"/>
      <path d="M 50 -110 A 380 380 0 0 1 50 650" stroke-width="3" opacity="0.16"/>
    </g>
  </g>

  <!-- 좌상단 로고 -->
  <g class="ko">
    <circle cx="84" cy="83" r="9" fill="#4f46e5"/>
    <text x="108" y="92" fill="#111827" font-size="32" font-weight="700" letter-spacing="-0.5">EasySite</text>
  </g>

  <!-- 우측 카피 영역 -->
  <g class="ko">
    <text x="580" y="280" fill="#4f46e5" font-size="22" font-weight="700" letter-spacing="4">FAST · AI · TRANSPARENT</text>

    <text x="580" y="360" fill="#111827" font-size="64" font-weight="800" letter-spacing="-1.2">1분 만에 견적,</text>
    <text x="580" y="436" fill="#111827" font-size="64" font-weight="800" letter-spacing="-1.2">AI가 만든 초안까지.</text>

    <text x="580" y="500" fill="#4b5563" font-size="24" font-weight="500">웹사이트 제작이 처음이어도 괜찮습니다</text>
  </g>

  <!-- 우하단 보조 라인 -->
  <g class="ko" text-anchor="end">
    <text x="1116" y="582" fill="#9ca3af" font-size="22" font-weight="500">easysite.kr · 1인 프리랜서 안홍준</text>
  </g>
</svg>
